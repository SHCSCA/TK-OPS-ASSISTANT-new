# Alembic configuration - used by CLI and programmatic API.
# DB URL is set dynamically by env.py (reads desktop_app.database.engine).

[alembic]
script_location = desktop_app/database/migrations
sqlalchemy.url = sqlite:///%(here)s/data/tk_ops.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
