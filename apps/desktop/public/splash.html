<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TK-OPS 启动中</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top left, rgba(14, 165, 164, 0.35), transparent 44%),
          linear-gradient(150deg, #031721, #050d16 56%, #0b1e2b);
        color: #e8f4ff;
        font-family: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      }
      .splash-root {
        text-align: center;
      }
      .logo {
        width: 110px;
        height: 110px;
        margin: 0 auto 18px;
        border-radius: 28px;
        display: grid;
        place-items: center;
        background: rgba(7, 17, 28, 0.88);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.06em;
      }
      h1 {
        margin: 0;
        font-size: 50px;
        line-height: 1;
        font-weight: 800;
      }
      p {
        margin: 8px 0 0;
        font-size: 30px;
        color: rgba(232, 244, 255, 0.9);
      }
      small {
        display: block;
        margin-top: 3px;
        color: rgba(232, 244, 255, 0.64);
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="splash-root">
      <div class="logo">TK</div>
      <h1>TK-OPS 运营助手</h1>
      <p>正在启动，请稍候...</p>
      <small>Starting UI...</small>
    </div>
  </body>
</html>
